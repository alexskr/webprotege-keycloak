name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip the run triggered by the bot's own SNAPSHOT bump commit at the end
    # of this workflow, otherwise the build would loop.
    if: ${{ github.actor != 'github-actions[bot]' }}
    outputs:
      version: ${{ steps.release-version.outputs.release_version }}
      service: webprotege-keycloak

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      # Read the version from pom.xml and strip the -SNAPSHOT suffix to
      # produce the release version.  For example, 2.0.2-SNAPSHOT becomes
      # 2.0.2.  If there is no -SNAPSHOT suffix the version is used as-is.
      - name: Determine release version
        id: release-version
        run: |
          current_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current pom version: $current_version"
          release_version=$(echo "$current_version" | sed -E 's/-SNAPSHOT$//')
          echo "Release version: $release_version"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set release version in pom.xml
        run: |
          find . -name 'pom.xml' -exec mvn versions:set \
            -DnewVersion=${{ steps.release-version.outputs.release_version }} \
            -DgenerateBackupPoms=false -f {} \;

      - name: Commit and tag release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # If the pom already had the release version (no -SNAPSHOT suffix),
          # there is nothing to commit — just tag the current HEAD.
          git diff --cached --quiet || \
            git commit -m "Release ${{ steps.release-version.outputs.release_version }}"
          git tag ${{ steps.release-version.outputs.release_version }}
          git push origin HEAD:${GITHUB_REF##*/}
          git push origin ${{ steps.release-version.outputs.release_version }}

      - name: Build SPI
        run: mvn --batch-mode package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build a single-arch amd64 image and load it into the local daemon so
      # the entrypoint integration test can run against it.  Buildx caches
      # layers between this build and the multi-arch push below, so the amd64
      # layers are reused.
      - name: Build image for integration test (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/webprotege-keycloak:${{ steps.release-version.outputs.release_version }}

      - name: Run entrypoint integration test
        run: ./test-entrypoint.sh ghcr.io/${{ github.repository_owner }}/webprotege-keycloak:${{ steps.release-version.outputs.release_version }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/webprotege-keycloak:${{ steps.release-version.outputs.release_version }}

      - name: Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release-version.outputs.release_version }}
          generate_release_notes: true

      # After the release, bump the patch version and add -SNAPSHOT to prepare
      # the pom for the next development cycle.  For example, after releasing
      # 2.0.2 the pom is set to 2.0.3-SNAPSHOT.
      - name: Prepare next development version
        run: |
          released=${{ steps.release-version.outputs.release_version }}
          IFS='.' read -r -a parts <<< "$released"
          parts[2]=$((parts[2] + 1))
          next_snapshot="${parts[0]}.${parts[1]}.${parts[2]}-SNAPSHOT"
          echo "Next development version: $next_snapshot"
          find . -name 'pom.xml' -exec mvn versions:set \
            -DnewVersion=$next_snapshot \
            -DgenerateBackupPoms=false -f {} \;
          git add .
          git commit -m "Prepare next development version ($next_snapshot)"
          git push origin HEAD:${GITHUB_REF##*/}
